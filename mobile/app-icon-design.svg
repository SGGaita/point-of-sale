<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#24222c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb3441;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGradient)"/>
  
  <!-- POS Icon Design - Shopping Cart/Register Symbol -->
  <!-- Cart base -->
  <path d="M 312 712 L 712 712 L 712 812 L 312 812 Z" fill="#ffffff" opacity="0.9"/>
  
  <!-- Cart handle -->
  <rect x="662" y="612" width="100" height="200" rx="50" fill="#ffffff" opacity="0.9"/>
  
  <!-- Receipt paper coming out -->
  <rect x="362" y="412" width="300" height="280" rx="20" fill="#ffffff"/>
  
  <!-- Receipt lines -->
  <line x1="412" y1="482" x2="612" y2="482" stroke="#24222c" stroke-width="12" stroke-linecap="round"/>
  <line x1="412" y1="532" x2="612" y2="532" stroke="#24222c" stroke-width="12" stroke-linecap="round"/>
  <line x1="412" y1="582" x2="562" y2="582" stroke="#24222c" stroke-width="12" stroke-linecap="round"/>
  <line x1="412" y1="632" x2="612" y2="632" stroke="#fb3441" stroke-width="16" stroke-linecap="round"/>
  
  <!-- POS text at top -->
  <text x="512" y="320" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="#ffffff" text-anchor="middle">POS</text>
</svg>
